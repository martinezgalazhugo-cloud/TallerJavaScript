<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taller de JavaScript</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="encabezado">
      <h1>Registro de Talleres Académicos</h1>
      <p>Mini aplicación desarrollada con HTML, CSS y JavaScript</p>
    </header>

    <main class="contenedor">
      <section class="seccion">
        <h2>Talleres disponibles</h2>

        <input
          type="text"
          id="buscador"
          placeholder="Buscar taller por nombre..."
          class="campo"
        />

        <div id="lista-talleres" class="grid-talleres">
          <!-- Aquí se cargarán los talleres con JavaScript -->
        </div>
      </section>

      <section class="seccion">
        <h2>Formulario de inscripción</h2>

        <form id="formulario-registro" class="formulario">
          <label for="nombre">Nombre del alumno:</label>
          <input
            type="text"
            id="nombre"
            class="campo"
            placeholder="Ej. Ana López"
          />

          <label for="correo">Correo institucional:</label>
          <input
            type="email"
            id="correo"
            class="campo"
            placeholder="Ej. 12345678901@ues.mx"
          />

          <label for="taller-seleccionado">Taller seleccionado:</label>
          <input type="text" id="taller-seleccionado" class="campo" readonly />

          <button type="submit" class="boton">Registrar alumno</button>
        </form>

        <p id="mensaje" class="mensaje"></p>
      </section>

      <section class="seccion">
        <h2>Alumnos inscritos</h2>

        <ul id="lista-inscritos" class="lista-inscritos">
          <!-- Aquí aparecerán los alumnos registrados -->
        </ul>
      </section>
    </main>

    <footer class="pie">
      <p>Taller: JavaScript fundamentos para avanzar hacia frameworks</p>
    </footer>

    <script type="module" src="js/app.js"></script>

  </body>
</html>
